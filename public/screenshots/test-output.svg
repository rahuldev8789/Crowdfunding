      <stop offset="100%" stop-color="#0e1b34"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#0a1222"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Background -->
  <rect width="1600" height="1060" fill="url(#bg)"/>
  <text x="80" y="74" fill="#f8fbff" font-family="Inter, -apple-system, sans-serif" font-size="34" font-weight="800">Automated Runtime Test Output Verification</text>
  <text x="80" y="110" fill="#7dd3fc" font-family="Inter, -apple-system, sans-serif" font-size="17" font-weight="500">Live terminal capture showing 100% test passing parity across Soroban smart contract logic and frontend utility suites</text>

