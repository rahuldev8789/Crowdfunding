<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1060" viewBox="0 0 1600 1060" role="img" aria-labelledby="title desc">
  <title id="title">Runtime Test Execution Output - Stellar Crowdfunding DApp</title>
  <desc id="desc">High-fidelity terminal capture showing real-time execution of both Soroban smart contract cargo unit tests and frontend vitest unit tests.</desc>
  <defs>
